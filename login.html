<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Connexion — Garage-Mecanik</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #111 0%, #000 70%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .portal-wrapper {
      position: relative;
      width: 500px;
      height: 500px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .portal-ring {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, #222 40%, #111 70%);
      box-shadow:
        0 0 60px rgba(255, 200, 0, 0.3),
        inset 0 0 40px rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .portal-glow {
      position: absolute;
      width: 80%;
      height: 80%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,215,0,0.3), transparent 70%);
    }

    .login-core {
      position: relative;
      width: 260px;
      background: rgba(15,15,15,0.95);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      z-index: 2;
      box-shadow: 0 0 40px rgba(0,0,0,0.7);
    }

    .login-core h2 {
      color: #FFD400;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 20px;
    }

    .login-core input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: white;
    }

    .login-core button {
      width: 100%;
      padding: 10px;
      background: #FFD400;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .login-core button:hover {
      background: #ffea00;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
    }

    .error {
      margin-top: 10px;
      color: #ff4d4d;
      font-size: 13px;
      min-height: 16px;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 0.8; }
      100% { opacity: 0.4; }
    }

    @keyframes slowRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ===============================
   JUNKYARD CAR PILLARS
=============================== */

.junkyard-left,
.junkyard-right {
  position: fixed;
  top: 0;
  width: 320px;
  height: 100vh;
  z-index: 0;
  background-repeat: repeat-y;
  background-size: contain;
  opacity: 0.15;
  filter: grayscale(100%) contrast(120%);
  pointer-events: none;
}

/* pile de chars pressés gauche */
.junkyard-left {
  left: 0;
background-image: url('/Garage-Mecanik/img/crushed-cars-left.jpg');
}

/* pile de chars pressés droite */
.junkyard-right {
  right: 0;
background-image: url('/Garage-Mecanik/img/crushed-cars-right.jpg');
}

/* centre au-dessus */
.portal-wrapper {
  z-index: 2;
}
  </style>
</head>


<body>

  <div class="junkyard-left"></div>
<div class="junkyard-right"></div>

  <div class="portal-wrapper">
  <div class="portal-ring">
    <div class="portal-glow"></div>

    <div class="login-core">
      <h2>Garage-Mecanik</h2>
      <p class="subtitle">Accès sécurisé à l'atelier</p>

      <input id="loginEmail" type="email" placeholder="Email">
      <input id="loginPassword" type="password" placeholder="Mot de passe">

      <button id="btnLogin">Entrer dans l’atelier</button>

      <div id="loginError" class="error"></div>
    </div>
  </div>
</div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://feeapfylfzlvgnqtglnh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlZWFwZnlsZnpsdmducXRnbG5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NDk3MDUsImV4cCI6MjA4MzAyNTcwNX0._ZQc89gbY5DFqFboR9fL8efeOZ2TZLG0zG8_5lzOOUY",
        {
    auth: {
  persistSession: true
}
  }
    );

    // Si déjà connecté -> aller direct au site
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = "index.html";

    const btn = document.getElementById("btnLogin");
    const err = document.getElementById("loginError");

    async function login(){
      err.textContent = "";

      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error){
        err.textContent = error.message;
        return;
      }

      window.location.href = "index.html";
    }

    btn.onclick = login;

    // Enter pour login
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
