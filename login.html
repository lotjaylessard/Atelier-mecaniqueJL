<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Connexion — Garage-Mecanik</title>
</head>

<body style="background:#0f0f0f;color:#fff;font-family:system-ui,Segoe UI,Arial;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;">

  <div style="background:#151515;border:1px solid #2a2a2a;border-radius:12px;padding:22px;width:320px;box-shadow:0 10px 30px rgba(0,0,0,.6);">
    <div style="font-size:18px;font-weight:700;margin-bottom:14px;">Connexion</div>

    <label style="display:block;font-size:12px;opacity:.8;margin-bottom:6px;">Email</label>
    <input id="loginEmail" type="email" autocomplete="username"
           style="width:100%;padding:10px;border-radius:10px;border:1px solid #333;background:#0f0f0f;color:#fff;margin-bottom:12px;" />

    <label style="display:block;font-size:12px;opacity:.8;margin-bottom:6px;">Mot de passe</label>
    <input id="loginPassword" type="password" autocomplete="current-password"
           style="width:100%;padding:10px;border-radius:10px;border:1px solid #333;background:#0f0f0f;color:#fff;margin-bottom:14px;" />

    <button id="btnLogin"
            style="width:100%;padding:10px;border-radius:10px;border:0;background:#FFD400;color:#000;font-weight:800;cursor:pointer;">
      Se connecter
    </button>

    <div id="loginError" style="margin-top:10px;color:#ff6b6b;font-size:12px;min-height:16px;"></div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      https://feeapfylfzlvgnqtglnh.supabase.co,
      eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlZWFwZnlsZnpsdmducXRnbG5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NDk3MDUsImV4cCI6MjA4MzAyNTcwNX0._ZQc89gbY5DFqFboR9fL8efeOZ2TZLG0zG8_5lzOOUY
    );

    // Si déjà connecté -> aller direct au site
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = "index.html";

    const btn = document.getElementById("btnLogin");
    const err = document.getElementById("loginError");

    async function login(){
      err.textContent = "";

      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error){
        err.textContent = error.message;
        return;
      }

      window.location.href = "index.html";
    }

    btn.onclick = login;

    // Enter pour login
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
